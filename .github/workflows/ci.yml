name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  rust:
    name: Rust quality
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned Rust toolchain
        run: rustup toolchain install 1.96.0 --profile minimal --component rustfmt --component clippy
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace
      - name: Build strict core documentation
        run: cargo doc -p tiny3d-core --no-deps
        env:
          RUSTDOCFLAGS: -Dwarnings

  licenses:
    name: Dependency licenses
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check licenses

  python:
    name: Optimized wheel, smoke, and goldens
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - name: Install pinned Rust toolchain
        run: rustup toolchain install 1.96.0 --profile minimal --component rustfmt --component clippy
      - name: Install build dependencies
        run: python -m pip install maturin numpy
      - name: Build optimized wheel
        working-directory: crates/tiny3d-py
        run: maturin build --release --locked --out dist
      - name: Install built wheel
        working-directory: crates/tiny3d-py
        run: python -m pip install --force-reinstall --no-deps dist/*.whl
      - name: Run Python smoke suite
        run: python golden/smoke.py
      - name: Run strict Linux x86_64 golden suite
        run: python golden/golden_gen.py check
        env:
          RAYON_NUM_THREADS: '2'
